name = "begit"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
# persist and head_sampling_rate are preset values for when enabled is switched to true
persist = true
head_sampling_rate = 1

[vars]
CF_ACCOUNT_ID = "c53d3c6ca02ae31a86aa3bf8fcbe5e55"
D1_DATABASE_ID = "9629cd07-59c2-4b35-a795-d91a6b43fd02"
R2_BUCKET = "begit-photos"
APP_BASE_URL = "https://begit.118029-ichikama.workers.dev"

# Cron トリガー（③④⑤⑥ の時刻起点通知）。
#   "* * * * *" → scheduled() で kind=minutely（③ challenge_end: 発行+1h）
#   "0 0 * * *" → scheduled() で kind=daily   （④⑤⑥ スプリント系）
[triggers]
crons = ["* * * * *", "0 0 * * *"]

# CRON_SECRET は内部 Cron 起動シークレット。本番は var に平文で置かず secret で登録する:
#   cd backend && npx wrangler secret put CRON_SECRET
# scheduled() が X-Cron-Secret ヘッダーで Go コンテナへ転送し cron_handler が定数時間比較する。

# R2 への S3 互換アクセス用シークレット（CF_API_TOKEN とは別物）。
# R2 ダッシュボード「Manage R2 API Tokens」で Access Key を発行し、本番に登録する:
#   cd backend && npx wrangler secret put R2_ACCESS_KEY_ID
#   cd backend && npx wrangler secret put R2_SECRET_ACCESS_KEY

[[containers]]
class_name = "BeGitAPI"
image = "./Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
name = "BEGIT_API"
class_name = "BeGitAPI"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BeGitAPI"]

[[d1_databases]]
binding = "DB"
database_name = "begit-db"
database_id = "9629cd07-59c2-4b35-a795-d91a6b43fd02"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "begit-photos"

# ── dev 環境（フロント共有用・DEV_MODE=true）────────────────────────────
# 本番（デフォルト env）とは別 Worker(begit-dev) + 別 D1(begit-db-dev) に隔離する。
# DEV_MODE はこの env にのみ存在するため、本番デプロイには絶対に乗らない。
# デプロイ: make deploy-dev / シード: make seed-dev
[env.dev]
name = "begit-dev"

[env.dev.vars]
DEV_MODE = "true"
CF_ACCOUNT_ID = "c53d3c6ca02ae31a86aa3bf8fcbe5e55"
D1_DATABASE_ID = "05f3624f-cac0-4158-a40e-0e3e67e9c383"
R2_BUCKET = "begit-photos"
APP_BASE_URL = "https://begit-dev.118029-ichikama.workers.dev"
# 実 GitHub OAuth を dev でも使う：GITHUB_CLIENT_ID は本物（iOS アプリと同じ公開 ID）。
# GITHUB_CLIENT_SECRET は秘密なので var に置かず secret で登録する（var に置くと毎デプロイで上書きされる）:
#   cd backend && npx wrangler secret put GITHUB_CLIENT_SECRET --env dev
DB_ENCRYPTION_KEY = "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"  # dev 用固定鍵（本番へ流用禁止）
GITHUB_CLIENT_ID = "Ov23lilFdIRDnZUp0ai7"
GITHUB_WEBHOOK_SECRET = "dev-webhook-secret"  # webhook は dev で未検証のためダミー
CRON_SECRET = "dev-cron-secret"  # dev 用の Cron 起動シークレット（本番は secret で登録: npx wrangler secret put CRON_SECRET --env <prod>）
#   cd backend && npx wrangler secret put CF_API_TOKEN --env dev
#
# R2 access key は dev でも secret として登録する（var に平文で置かない）。
# 未登録なら実値が無いためスタブ R2 で動作する。begit-dev で実 R2(begit-photos)
# を検証したい場合のみ、R2 ダッシュボードで発行した Access Key を secret 登録する:
#   cd backend && npx wrangler secret put R2_ACCESS_KEY_ID --env dev
#   cd backend && npx wrangler secret put R2_SECRET_ACCESS_KEY --env dev
# 登録すると Go コンテナが自動で実 R2 クライアントに切り替わる（DEV_MODE でも実 R2 を使用）。

# dev でも Cron トリガーを有効化（wrangler dev --test-scheduled で /__scheduled 経由の疎通確認に使用）
[env.dev.triggers]
crons = ["* * * * *", "0 0 * * *"]

[[env.dev.containers]]
class_name = "BeGitAPI"
image = "./Dockerfile"
max_instances = 1

[[env.dev.durable_objects.bindings]]
name = "BEGIT_API"
class_name = "BeGitAPI"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["BeGitAPI"]

[[env.dev.d1_databases]]
binding = "DB"
database_name = "begit-db-dev"
database_id = "05f3624f-cac0-4158-a40e-0e3e67e9c383"

# dev は R2 を本番と共有（シードは写真を作らないため低リスク）。
# 分離したい場合は begit-photos-dev を作成して bucket_name を変更する。
[[env.dev.r2_buckets]]
binding = "PHOTOS"
bucket_name = "begit-photos"
