components:
  schemas:
    handler.AuthRequest:
      properties:
        code:
          example: abcdef123456
          type: string
      type: object
    handler.AuthResponse:
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/handler.UserJSON'
      type: object
    handler.CommentJSON:
      properties:
        avatar_url:
          type: string
        body:
          type: string
        created_at:
          type: string
        id:
          type: integer
        login:
          type: string
        post_id:
          type: integer
        user_id:
          type: integer
      type: object
    handler.CommentListResponse:
      properties:
        comments:
          items:
            $ref: '#/components/schemas/handler.CommentJSON'
          type: array
          uniqueItems: false
      type: object
    handler.CommitJSON:
      properties:
        additions:
          type: integer
        author_login:
          type: string
        author_name:
          type: string
        date:
          type: string
        deletions:
          type: integer
        message:
          type: string
        sha:
          type: string
      type: object
    handler.CommitListResponse:
      properties:
        commits:
          items:
            $ref: '#/components/schemas/handler.CommitJSON'
          type: array
          uniqueItems: false
      type: object
    handler.CreateCommentRequest:
      properties:
        body:
          type: string
      type: object
    handler.CreateGroupRequest:
      properties:
        name:
          example: My Repo
          type: string
        repo_full_name:
          example: owner/repo
          type: string
      type: object
    handler.CreatePostRequest:
      properties:
        body:
          type: string
        github_login:
          type: string
        notification_id:
          type: integer
        repo_full_name:
          type: string
      type: object
    handler.CreateReactionRequest:
      properties:
        reaction_type:
          type: string
      type: object
    handler.DevLoginRequest:
      properties:
        login:
          example: alice
          type: string
      type: object
    handler.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    handler.GroupDetailJSON:
      properties:
        avatar_url:
          type: string
        id:
          type: integer
        members:
          items:
            $ref: '#/components/schemas/handler.GroupMemberJSON'
          type: array
          uniqueItems: false
        name:
          type: string
        repo_full_name:
          type: string
      type: object
    handler.GroupJSON:
      properties:
        avatar_url:
          type: string
        id:
          type: integer
        name:
          type: string
        repo_full_name:
          type: string
      type: object
    handler.GroupListResponse:
      properties:
        groups:
          items:
            $ref: '#/components/schemas/handler.GroupJSON'
          type: array
          uniqueItems: false
      type: object
    handler.GroupMemberJSON:
      properties:
        avatar_url:
          type: string
        login:
          type: string
        role:
          type: string
        user_id:
          type: integer
      type: object
    handler.MemberListResponse:
      properties:
        members:
          items:
            $ref: '#/components/schemas/handler.GroupMemberJSON'
          type: array
          uniqueItems: false
      type: object
    handler.MemberStatusJSON:
      properties:
        avatar_url:
          type: string
        login:
          type: string
        status:
          description: '"On Time" | "Late" | "Missed"'
          example: On Time
          type: string
        user_id:
          type: integer
      type: object
    handler.NotificationJSON:
      properties:
        id:
          type: integer
        sent_at:
          type: string
        sprint_id:
          type: integer
      type: object
    handler.NotificationStatusJSON:
      properties:
        members:
          items:
            $ref: '#/components/schemas/handler.MemberStatusJSON'
          type: array
          uniqueItems: false
        notification_id:
          type: integer
      type: object
    handler.PhotoJSON:
      properties:
        id:
          type: integer
        photo_type:
          type: string
        url:
          type: string
      type: object
    handler.PostFeedJSON:
      properties:
        additions:
          type: integer
        avatar_url:
          type: string
        body:
          type: string
        commit_count:
          type: integer
        created_at:
          type: string
        deletions:
          type: integer
        id:
          type: integer
        latest_commit_message:
          type: string
        login:
          type: string
        photos:
          items:
            $ref: '#/components/schemas/handler.PhotoJSON'
          type: array
          uniqueItems: false
        post_type:
          type: string
        repo_full_name:
          type: string
        status:
          type: string
        user_id:
          type: integer
      type: object
    handler.PostJSON:
      properties:
        additions:
          type: integer
        body:
          type: string
        commit_count:
          type: integer
        created_at:
          type: string
        deletions:
          type: integer
        id:
          type: integer
        latest_commit_message:
          type: string
        post_type:
          type: string
        repo_full_name:
          type: string
        status:
          type: string
        user_id:
          type: integer
      type: object
    handler.PostListResponse:
      properties:
        posts:
          items:
            $ref: '#/components/schemas/handler.PostFeedJSON'
          type: array
          uniqueItems: false
      type: object
    handler.ReactionJSON:
      properties:
        avatar_url:
          type: string
        id:
          type: integer
        login:
          type: string
        post_id:
          type: integer
        reaction_type:
          type: string
        user_id:
          type: integer
      type: object
    handler.ReactionListResponse:
      properties:
        reactions:
          items:
            $ref: '#/components/schemas/handler.ReactionJSON'
          type: array
          uniqueItems: false
      type: object
    handler.RepoJSON:
      properties:
        avatar_url:
          type: string
        can_admin:
          type: boolean
        can_push:
          type: boolean
        full_name:
          type: string
        name:
          type: string
        owner_login:
          type: string
        private:
          type: boolean
      type: object
    handler.RepoListResponse:
      properties:
        repos:
          items:
            $ref: '#/components/schemas/handler.RepoJSON'
          type: array
          uniqueItems: false
      type: object
    handler.UpdateFCMTokenRequest:
      properties:
        fcm_token:
          example: fcm-device-token
          type: string
      type: object
    handler.UploadPhotosResponse:
      properties:
        photos:
          items:
            $ref: '#/components/schemas/handler.PhotoJSON'
          type: array
          uniqueItems: false
      type: object
    handler.UserJSON:
      properties:
        avatar_url:
          type: string
        id:
          type: integer
        login:
          type: string
        name:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: '`Authorization: Bearer <token>` 形式でアクセストークンを付与する。'
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: BeGit バックエンド API。GitHub と連携したリポジトリ単位のグループ・通知・投稿機能を提供する。
  title: BeGit API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/dev:
    post:
      description: GitHub OAuth を通さず固定トークン dev_<login> を発行する。DEV_MODE=true のときのみ有効。body
        省略時は alice。
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handler.DevLoginRequest'
                description: ログイン名（省略時 alice）
                summary: request
        description: ログイン名（省略時 alice）
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.AuthResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      summary: dev 専用ログイン（DEV_MODE 限定）
      tags:
      - auth
  /auth/github:
    post:
      description: GitHub OAuth 認可コードをアクセストークンへ交換し、ユーザーを作成/更新してトークンを発行する
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handler.AuthRequest'
                description: GitHub 認可コード
                summary: request
        description: GitHub 認可コード
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.AuthResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      summary: GitHub OAuth ログイン
      tags:
      - auth
  /auth/logout:
    post:
      description: FCM トークンを削除する。認証はステートレス（GitHub アクセストークン）のためサーバー側のトークン失効は行わない。
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: ログアウト
      tags:
      - auth
  /github/repos:
    get:
      description: 認証ユーザーが push / admin 権限を持つリポジトリ一覧を返す。グループ作成時のリポジトリ選択に使う。
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.RepoListResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Gateway
      security:
      - BearerAuth: []
      summary: GitHub リポジトリ一覧
      tags:
      - github
  /groups:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.GroupListResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 参加グループ（リポジトリ）一覧
      tags:
      - groups
    post:
      description: GitHub リポジトリを登録し Webhook を設定する
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handler.CreateGroupRequest'
                description: 作成するリポジトリ
                summary: request
        description: 作成するリポジトリ
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.GroupJSON'
          description: Created
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Conflict
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Gateway
      security:
      - BearerAuth: []
      summary: グループ作成
      tags:
      - groups
  /groups/{id}:
    get:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.GroupDetailJSON'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: グループ詳細 + メンバー
      tags:
      - groups
  /groups/{id}/commits:
    get:
      description: グループに紐づく GitHub リポジトリのコミット履歴を返す（GET /repos/{owner}/{repo}/commits
        のプロキシ）。
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: author でフィルタ（login or email）
        in: query
        name: author
        schema:
          type: string
      - description: ISO8601 これ以降
        in: query
        name: since
        schema:
          type: string
      - description: ISO8601 これ以前
        in: query
        name: until
        schema:
          type: string
      - description: 取得件数（1〜50、既定 20）
        in: query
        name: per_page
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.CommitListResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Gateway
      security:
      - BearerAuth: []
      summary: コミット一覧
      tags:
      - github
  /groups/{id}/notifications:
    post:
      description: 1 スプリント 1 人 1 回まで
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.NotificationJSON'
          description: Created
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: BeGit Time 通知発行
      tags:
      - notifications
  /groups/{id}/notifications/{nid}:
    get:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: 通知 ID
        in: path
        name: nid
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.NotificationStatusJSON'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 通知の達成ステータス（On Time / Late / Missed）
      tags:
      - notifications
  /groups/{id}/posts:
    get:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.PostListResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: フィード取得
      tags:
      - posts
    post:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handler.CreatePostRequest'
                description: 投稿内容
                summary: request
        description: 投稿内容
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.PostJSON'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Gateway
      security:
      - BearerAuth: []
      summary: 投稿作成
      tags:
      - posts
  /groups/{id}/posts/{postId}/comments:
    get:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: 投稿 ID
        in: path
        name: postId
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.CommentListResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: コメント一覧
      tags:
      - comments
    post:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: 投稿 ID
        in: path
        name: postId
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/handler.CreateCommentRequest'
                description: コメント本文
                summary: request
        description: コメント本文
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.CommentJSON'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: コメント投稿
      tags:
      - comments
  /groups/{id}/posts/{postId}/comments/{commentId}:
    delete:
      parameters:
      - description: グループ ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: 投稿 ID
        in: path
        name: postId
        required: true
        schema:
          type: integer
      - description: コメント ID
        in: path
        name: commentId
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: コメント削除
