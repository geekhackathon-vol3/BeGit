name: Deploy (dev)

# begit-dev（DEV_MODE=true・フロント共有用）を手動デプロイする。
# Actions 画面の "Run workflow" から実行する（本番 deploy.yml とは独立）。
on:
  workflow_dispatch:

jobs:
  deploy-dev:
    name: Deploy to begit-dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Deploy Workers (dev)
        run: npx wrangler deploy --env dev
      - name: Apply D1 migrations (dev)
        run: npx wrangler d1 migrations apply begit-db-dev --env dev --remote
      - name: Seed dev data (best-effort)
        # コールドスタート直後は失敗しうるため、失敗してもワークフローは成功扱いにする。
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          # コンテナ起動待ち（最大 ~60s）
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$DEV_URL/healthz" || true)
            [ "$code" = "200" ] && break
            sleep 5
          done
          DEV_URL="$DEV_URL" ./scripts/seed-dev.sh
        env:
          DEV_URL: https://begit-dev.118029-ichikama.workers.dev
